{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Request Leave</title>
    <link rel="stylesheet" href="{% static 'student/attendance.css' %}">
    <style>
        .leave-form { max-width: 400px; margin: 20px auto; }
        .form-group { margin-bottom: 12px; }
        .form-group input, .form-group textarea { width: 100%; padding: 6px; }
        button { background: #3498db; color: #fff; padding: 8px 16px; border: none; cursor: pointer; }
        button:hover { background: #2980b9; }
        .message-box { background: #d4edda; padding: 10px; border:1px solid #c3e6cb; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="leave-container" style="max-width:500px;margin:20px auto;padding:20px;border:1px solid #ccc;border-radius:8px;background:#fafafa;">
        <h1 style="text-align:center;margin-bottom:20px;">Leave Request</h1>
        {% if messages %}
            <div class="message-box">
                {% for msg in messages %}
                    <p>{{ msg }}</p>
                {% endfor %}
            </div>
        {% endif %}
        <form method="post" class="leave-form">
            {% csrf_token %}
            <div class="form-group">
                {{ form.date.label_tag }}<br>
                {{ form.date }}
            </div>
            <div class="form-group">
                {{ form.reason.label_tag }}<br>
                {{ form.reason }}
            </div>
            <div style="text-align:center;">
                <button type="submit">Submit Leave</button>
            </div>
        </form>
        <p style="text-align:center;margin-top:15px;"><a href="{% url 'student_dashboard' %}">Back to dashboard</a></p>
    </div>
</body>
</html>
